<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MCQ Grader — Automated Grading System</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: linear-gradient(180deg, #f8fafc, #eff6ff); min-height: 100vh; color: #1f2937; }
  .header { background: #fff; border-bottom: 1px solid #e5e7eb; box-shadow: 0 1px 3px rgba(0,0,0,.04); }
  .header-inner { max-width: 760px; margin: 0 auto; padding: 16px 16px 0; display: flex; align-items: center; gap: 12px; }
  .logo { width: 36px; height: 36px; border-radius: 10px; background: #2563eb; display:flex; align-items:center; justify-content:center; color:#fff; font-weight:800; font-size:18px; }
  .header-text h1 { font-size: 16px; font-weight: 800; line-height: 1.2; }
  .header-text p { font-size: 12px; color: #9ca3af; }
  .badge { margin-left: auto; background: #dbeafe; color: #2563eb; font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 20px; }
  .tabs { max-width: 760px; margin: 0 auto; padding: 0 16px; display: flex; border-top: 1px solid #f3f4f6; }
  .tab { padding: 10px 18px; font-size: 14px; font-weight: 600; color: #6b7280; border: none; background: none; cursor: pointer; border-bottom: 2px solid transparent; }
  .tab.active { color: #2563eb; border-bottom-color: #2563eb; }
  .container { max-width: 760px; margin: 0 auto; padding: 24px 16px; }
  .card { background: #fff; border-radius: 16px; border: 1px solid #e5e7eb; padding: 24px; box-shadow: 0 1px 2px rgba(0,0,0,.03); margin-bottom: 20px; }
  .card h2 { font-size: 17px; font-weight: 800; margin-bottom: 4px; }
  .card .sub { font-size: 13px; color: #9ca3af; margin-bottom: 20px; }
  .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin-bottom: 18px; }
  label { font-size: 13px; font-weight: 600; color: #374151; }
  input[type=number], input[type=text] { padding: 7px 12px; border: 1px solid #d1d5db; border-radius: 10px; font-size: 14px; outline: none; }
  input:focus { border-color: #2563eb; box-shadow: 0 0 0 3px #dbeafe; }
  input[type=number] { width: 72px; }
  input[type=text] { width: 100%; }
  .btn { border: none; cursor: pointer; padding: 8px 16px; border-radius: 10px; font-size: 13px; font-weight: 700; }
  .btn-gray { background: #f3f4f6; color: #374151; }
  .btn-gray:hover { background: #e5e7eb; }
  .btn-blue { background: #2563eb; color: #fff; }
  .btn-blue:hover { background: #1d4ed8; }
  .btn-green { background: #059669; color: #fff; }
  .btn-green:hover { background: #047857; }
  .btn-full { width: 100%; padding: 13px; font-size: 15px; border-radius: 12px; }
  .btn:disabled { background: #d1d5db !important; color: #9ca3af !important; cursor: not-allowed; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; }
  .qbox { display: flex; align-items: center; gap: 8px; background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 10px; padding: 8px 10px; }
  .qbox .qn { font-size: 11px; font-weight: 800; color: #9ca3af; width: 22px; }
  .qbox select { border: none; background: transparent; font-weight: 700; font-size: 14px; outline: none; flex: 1; color: #374151; cursor: pointer; }
  .help { font-size: 12px; text-align: center; color: #f87171; margin-top: 8px; }
  .student-row { padding: 12px 0; border-bottom: 1px solid #f3f4f6; display: flex; align-items: center; gap: 12px; }
  .student-row:last-child { border-bottom: none; }
  .student-name { font-weight: 700; font-size: 14px; flex-shrink:0; min-width: 90px; }
  .bar-wrap { flex: 1; display: flex; align-items: center; gap: 8px; }
  .bar-bg { flex: 1; background: #f3f4f6; border-radius: 10px; height: 8px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 10px; transition: width .4s; }
  .score-text { font-size: 12px; color: #9ca3af; white-space: nowrap; }
  .badge-pill { font-size: 11px; font-weight: 800; padding: 3px 9px; border-radius: 20px; white-space: nowrap; }
  .green-pill { background: #d1fae5; color: #047857; }
  .yellow-pill { background: #fef3c7; color: #b45309; }
  .red-pill { background: #fee2e2; color: #b91c1c; }
  .blue-pill { background: #dbeafe; color: #1d4ed8; }
  .gray-pill { background: #f3f4f6; color: #6b7280; }
  .del-btn { color: #d1d5db; background: none; border: none; font-size: 20px; cursor: pointer; line-height: 1; padding: 0 4px; }
  .del-btn:hover { color: #f87171; }
  .summary-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
  @media (min-width: 500px) { .summary-grid { grid-template-columns: repeat(4, 1fr); } }
  .summary-box { background: #fff; border: 1px solid #e5e7eb; border-radius: 16px; padding: 16px; text-align: center; }
  .summary-box .val { font-size: 24px; font-weight: 800; }
  .summary-box .lbl { font-size: 11px; color: #9ca3af; margin-top: 4px; }
  .empty { text-align: center; padding: 60px 20px; color: #9ca3af; }
  .empty .icon { font-size: 44px; margin-bottom: 12px; }
  .clickable { cursor: pointer; }
  .clickable:hover { background: #f9fafb; }
  .detail-card { border: 1px solid #bfdbfe; }
  .detail-header { background: #eff6ff; padding: 14px 24px; border-radius: 16px 16px 0 0; margin: -24px -24px 16px; font-weight: 800; color: #1d4ed8; }
  .q-detail-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 10px; }
  .q-cell { border-radius: 10px; padding: 10px; text-align: center; border: 1px solid; }
  .q-cell.right { background: #ecfdf5; border-color: #a7f3d0; }
  .q-cell.wrong { background: #fef2f2; border-color: #fecaca; }
  .q-cell .qn2 { font-size: 11px; font-weight: 800; color: #9ca3af; }
  .q-cell .ans { font-size: 16px; font-weight: 800; }
  .q-cell.right .ans { color: #059669; }
  .q-cell.wrong .ans { color: #ef4444; }
  .q-cell .correctAns { font-size: 11px; color: #9ca3af; }
  .qstat-row { display: flex; align-items: center; gap: 12px; padding: 10px 24px; border-bottom: 1px solid #f3f4f6; }
  .qstat-row:last-child { border-bottom: none; }
  .qstat-row .qn3 { font-size: 12px; font-weight: 800; color: #9ca3af; width: 30px; }
  .qstat-row .meta { font-size: 12px; color: #9ca3af; width: 90px; text-align: right; }
  .qstat-row .ansLabel { font-size: 12px; font-weight: 800; color: #9ca3af; }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="logo">M</div>
    <div class="header-text">
      <h1>MCQ Grader</h1>
      <p>Automated MCQ Grading & Assessment System</p>
    </div>
    <span class="badge" id="studentBadge" style="display:none"></span>
  </div>
  <div class="tabs">
    <button class="tab active" id="tabBtn0" onclick="switchTab(0)">⚙️ Setup</button>
    <button class="tab" id="tabBtn1" onclick="switchTab(1)">✏️ Grade</button>
    <button class="tab" id="tabBtn2" onclick="switchTab(2)">📊 Report</button>
  </div>
</div>

<div class="container">

  <div id="tab0">
    <div class="card">
      <h2>Configure Answer Key</h2>
      <div class="sub">Set the correct answers for each question.</div>
      <div class="row">
        <label>Questions:</label>
        <input type="number" id="numQuestions" value="10" min="1" max="50" onchange="changeNumQuestions()" />
        <button class="btn btn-gray" onclick="loadSample()">Load Sample (10 Qs)</button>
      </div>
      <div class="grid" id="answerKeyGrid"></div>
    </div>
    <button class="btn btn-blue btn-full" id="continueBtn" onclick="switchTab(1)" disabled>Continue to Grade Students →</button>
    <div class="help" id="setupHelp">Fill in all answers before continuing.</div>
  </div>

  <div id="tab1" style="display:none">
    <div class="card">
      <h2>Enter Student Answers</h2>
      <div class="sub">Enter the student's name and their selected answers.</div>
      <label>Student Name</label><br/>
      <input type="text" id="studentName" placeholder="e.g. John Doe" style="margin-top:6px; margin-bottom:16px;" />
      <div class="grid" id="studentAnswerGrid"></div>
      <br/>
      <button class="btn btn-green btn-full" onclick="addStudent()">+ Add & Grade Student</button>
    </div>
    <div class="card" id="studentListCard" style="display:none">
      <h2 id="studentCountTitle">Graded Students (0)</h2>
      <div id="studentList"></div>
    </div>
    <button class="btn btn-blue btn-full" id="viewReportBtn" style="display:none" onclick="switchTab(2)">View Full Report →</button>
  </div>

  <div id="tab2" style="display:none">
    <div id="reportContent"></div>
  </div>

</div>

<script>
let numQuestions = 10;
let answerKey = Array.from({length:10}, (_,i)=>({q:i+1, answer:""}));
let studentAnswers = Array.from({length:10}, (_,i)=>({q:i+1, answer:""}));
let students = [];
let selectedStudentId = null;

const SAMPLE = ["A","C","B","D","A","C","B","A","D","C"];

function el(id){ return document.getElementById(id); }

function switchTab(idx){
  for(let i=0;i<3;i++){
    el('tab'+i).style.display = i===idx ? 'block' : 'none';
    el('tabBtn'+i).classList.toggle('active', i===idx);
  }
  if(idx===2) renderReport();
}

function optionsHtml(selected){
  let opts = ['<option value="">-</option>'];
  ['A','B','C','D','E'].forEach(o=>{
    opts.push('<option value="'+o+'"'+(selected===o?' selected':'')+'>'+o+'</option>');
  });
  return opts.join('');
}

function renderAnswerKeyGrid(){
  el('answerKeyGrid').innerHTML = answerKey.map((item,idx)=>
    '<div class="qbox"><span class="qn">Q'+item.q+'</span><select onchange="updateAnswerKey('+idx+',this.value)">'+optionsHtml(item.answer)+'</select></div>'
  ).join('');
  checkSetupComplete();
}

function renderStudentAnswerGrid(){
  el('studentAnswerGrid').innerHTML = studentAnswers.map((item,idx)=>
    '<div class="qbox"><span class="qn">Q'+item.q+'</span><select onchange="updateStudentAnswer('+idx+',this.value)">'+optionsHtml(item.answer)+'</select></div>'
  ).join('');
}

function updateAnswerKey(idx,val){ answerKey[idx].answer = val; checkSetupComplete(); }
function updateStudentAnswer(idx,val){ studentAnswers[idx].answer = val; }

function checkSetupComplete(){
  const allFilled = answerKey.length>0 && answerKey.every(k=>k.answer);
  el('continueBtn').disabled = !allFilled;
  el('setupHelp').style.display = allFilled ? 'none' : 'block';
}

function changeNumQuestions(){
  let n = parseInt(el('numQuestions').value)||10;
  n = Math.max(1, Math.min(50, n));
  el('numQuestions').value = n;
  numQuestions = n;
  const newKey = [];
  const newAns = [];
  for(let i=0;i<n;i++){
    newKey.push(answerKey[i] || {q:i+1, answer:""});
    newAns.push(studentAnswers[i] || {q:i+1, answer:""});
  }
  answerKey = newKey;
  studentAnswers = newAns;
  renderAnswerKeyGrid();
  renderStudentAnswerGrid();
}

function loadSample(){
  numQuestions = 10;
  el('numQuestions').value = 10;
  answerKey = SAMPLE.map((a,i)=>({q:i+1, answer:a}));
  studentAnswers = Array.from({length:10},(_,i)=>({q:i+1, answer:""}));
  renderAnswerKeyGrid();
  renderStudentAnswerGrid();
}

function addStudent(){
  const name = el('studentName').value.trim();
  if(!name) return alert('Please enter a student name.');
  if(!studentAnswers.every(a=>a.answer)) return alert('Please answer all questions for this student.');
  const graded = studentAnswers.map((a,i)=>({
    q:a.q, given:a.answer, correct:answerKey[i].answer, isRight:a.answer===answerKey[i].answer
  }));
  const score = graded.filter(g=>g.isRight).length;
  students.push({ id: Date.now(), name, graded, score, total: answerKey.length });
  el('studentName').value = '';
  studentAnswers = answerKey.map(k=>({q:k.q, answer:""}));
  renderStudentAnswerGrid();
  renderStudentList();
  updateBadge();
}

function removeStudent(id){
  students = students.filter(s=>s.id!==id);
  renderStudentList();
  updateBadge();
}

function gradeColor(pct){
  if(pct>=70) return 'green';
  if(pct>=50) return 'yellow';
  return 'red';
}
function gradeLetter(pct){
  if(pct>=90) return 'A'; if(pct>=80) return 'B'; if(pct>=70) return 'C'; if(pct>=60) return 'D'; return 'F';
}

function renderStudentList(){
  if(students.length===0){
    el('studentListCard').style.display='none';
    el('viewReportBtn').style.display='none';
    return;
  }
  el('studentListCard').style.display='block';
  el('viewReportBtn').style.display='block';
  el('studentCountTitle').textContent = 'Graded Students ('+students.length+')';
  el('studentList').innerHTML = students.map(s=>{
    const pct = Math.round((s.score/s.total)*100);
    const color = gradeColor(pct);
    const letter = gradeLetter(pct);
    return '<div class="student-row">'+
      '<div class="student-name">'+escapeHtml(s.name)+'</div>'+
      '<div class="bar-wrap"><div class="bar-bg"><div class="bar-fill" style="width:'+pct+'%; background:'+barColor(color)+'"></div></div>'+
      '<span class="score-text">'+s.score+'/'+s.total+'</span></div>'+
      '<span class="badge-pill '+color+'-pill">'+pct+'% · '+letter+'</span>'+
      '<button class="del-btn" onclick="removeStudent('+s.id+')">×</button>'+
    '</div>';
  }).join('');
}

function barColor(c){
  if(c==='green') return '#10b981';
  if(c==='yellow') return '#fbbf24';
  return '#f87171';
}

function updateBadge(){
  const b = el('studentBadge');
  if(students.length>0){
    b.style.display='inline-block';
    b.textContent = students.length+' student'+(students.length!==1?'s':'')+' graded';
  } else {
    b.style.display='none';
  }
}

function escapeHtml(str){
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderReport(){
  const content = el('reportContent');
  if(students.length===0){
    content.innerHTML = '<div class="card"><div class="empty"><div class="icon">📋</div><p>No students graded yet. Add students in the Grade tab.</p></div></div>';
    return;
  }
  const avgScore = students.reduce((a,s)=>a+s.score,0)/students.length;
  const avgPct = Math.round((avgScore/answerKey.length)*100);
  const highest = students.reduce((a,b)=>a.score>b.score?a:b);
  const lowest = students.reduce((a,b)=>a.score<b.score?a:b);

  const questionStats = answerKey.map((k,i)=>{
    const correct = students.filter(s=>s.graded[i] && s.graded[i].isRight).length;
    return { q:k.q, answer:k.answer, correct, total:students.length, pct: Math.round((correct/students.length)*100) };
  }).sort((a,b)=>a.pct-b.pct);

  let html = '<div class="summary-grid">';
  html += summaryBox(students.length, 'Students', '#2563eb');
  html += summaryBox(avgPct+'%', 'Class Average', avgPct>=70?'#059669':'#ef4444');
  html += summaryBox(Math.round((highest.score/highest.total)*100)+'%', 'Highest', '#059669');
  html += summaryBox(Math.round((lowest.score/lowest.total)*100)+'%', 'Lowest', '#ef4444');
  html += '</div>';

  html += '<div class="card" style="padding:0; overflow:hidden;"><div style="padding:18px 24px; border-bottom:1px solid #f3f4f6;"><h2 style="margin:0;">Student Results</h2></div>';
  const sorted = [...students].sort((a,b)=>b.score-a.score);
  sorted.forEach((s,rank)=>{
    const pct = Math.round((s.score/s.total)*100);
    const color = gradeColor(pct);
    const letter = gradeLetter(pct);
    html += '<div class="student-row clickable" style="padding:12px 24px;" onclick="selectStudent('+s.id+')">'+
      '<span style="font-size:11px;color:#d1d5db;width:24px;">#'+(rank+1)+'</span>'+
      '<div class="student-name">'+escapeHtml(s.name)+'</div>'+
      '<div class="bar-wrap"><div class="bar-bg"><div class="bar-fill" style="width:'+pct+'%; background:'+barColor(color)+'"></div></div>'+
      '<span class="score-text">'+s.score+'/'+s.total+'</span></div>'+
      '<span class="badge-pill '+color+'-pill">'+pct+'% · '+letter+'</span>'+
    '</div>';
  });
  html += '</div>';

  if(selectedStudentId!==null){
    const st = students.find(s=>s.id===selectedStudentId);
    if(st){
      html += '<div class="card detail-card"><div class="detail-header">'+escapeHtml(st.name)+' — Detailed Breakdown</div>';
      html += '<div class="q-detail-grid">';
      st.graded.forEach(g=>{
        html += '<div class="q-cell '+(g.isRight?'right':'wrong')+'">'+
          '<div class="qn2">Q'+g.q+'</div><div class="ans">'+(g.given||'–')+'</div>'+
          (!g.isRight ? '<div class="correctAns">✓ '+g.correct+'</div>' : '')+
        '</div>';
      });
      html += '</div></div>';
    }
  }

  html += '<div class="card" style="padding:0; overflow:hidden;"><div style="padding:18px 24px; border-bottom:1px solid #f3f4f6;"><h2 style="margin:0;">Question Difficulty Analysis</h2></div>';
  questionStats.forEach(qs=>{
    const color = qs.pct>=70?'green':qs.pct>=40?'yellow':'red';
    html += '<div class="qstat-row">'+
      '<span class="qn3">Q'+qs.q+'</span>'+
      '<div class="bar-bg" style="flex:1"><div class="bar-fill" style="width:'+qs.pct+'%; background:'+barColor(color)+'"></div></div>'+
      '<span class="meta">'+qs.correct+'/'+qs.total+' correct</span>'+
      '<span class="badge-pill '+color+'-pill">'+qs.pct+'%</span>'+
      '<span class="ansLabel">Ans: '+qs.answer+'</span>'+
    '</div>';
  });
  html += '</div>';

  content.innerHTML = html;
}

function summaryBox(val, lbl, color){
  return '<div class="summary-box"><div class="val" style="color:'+color+'">'+val+'</div><div class="lbl">'+lbl+'</div></div>';
}

function selectStudent(id){
  selectedStudentId = selectedStudentId===id ? null : id;
  renderReport();
}

renderAnswerKeyGrid();
renderStudentAnswerGrid();
</script>
</body>
</html>
